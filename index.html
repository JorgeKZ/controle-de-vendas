<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM DE CAMPO - Controle de Vendas e Visitas</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Cores Dinâmicas de Status sintonizadas com os Filtros */
        .status-badge-lead-frio { background-color: #fee2e2; color: #991b1b; }
        .status-badge-em-negociacao { background-color: #fef3c7; color: #92400e; }
        .status-badge-conquista { background-color: #dcfce7; color: #166534; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-indigo-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 shadow-lg shadow-indigo-200">
                    <i class="fas fa-route"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">CRM de Campo</h1>
                <p class="text-slate-500 text-sm mt-1">Faça login para acessar suas rotas e leads</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">E-mail</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="login-email" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-slate-50 focus:bg-white transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Senha</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="login-password" required class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-slate-50 focus:bg-white transition-all">
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 mt-2">
                    <span>Entrar no Sistema</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- APP PRINCIPAL (OCULTO POR PADRÃO) -->
    <div id="app-screen" class="hidden flex flex-col flex-1">
        <!-- HEADER -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2 rounded-xl text-lg">
                    <i class="fas fa-route"></i>
                </div>
                <div>
                    <h2 class="font-bold text-slate-800 leading-tight">CRM de Campo</h2>
                    <span id="user-display-email" class="text-xs text-slate-500 block">usuario@email.com</span>
                </div>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-rose-600 p-2.5 rounded-xl hover:bg-slate-50 transition-all text-sm flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i>
                <span class="hidden sm:inline font-medium">Sair</span>
            </button>
        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="flex-1 p-4 max-w-5xl w-full mx-auto pb-24">
            
            <!-- ABA: LEADS -->
            <section id="tab-leads" class="tab-content active space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-slate-800">Seus Leads</h2>
                    <button id="open-add-lead-modal" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-semibold shadow-md flex items-center gap-2 transition-all">
                        <i class="fas fa-plus"></i> Novo Lead
                    </button>
                </div>

                <!-- Filtros de Leads -->
                <div class="bg-white p-3 rounded-xl border border-slate-200 flex flex-wrap gap-2 items-center">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider px-1">Filtrar:</span>
                    <button class="filter-btn active bg-slate-100 text-slate-700 px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all" data-status="todos">Todos</button>
                    <button class="filter-btn bg-red-50 text-red-700 hover:bg-red-100 px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all" data-status="Lead Frio">Lead Frio</button>
                    <button class="filter-btn bg-amber-50 text-amber-700 hover:bg-amber-100 px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all" data-status="Em Negociação">Em Negociação</button>
                    <button class="filter-btn bg-green-50 text-green-700 hover:bg-green-100 px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all" data-status="Conquista">Conquista</button>
                </div>

                <!-- Lista de Leads -->
                <div id="leads-container" class="grid gap-3 sm:grid-cols-2">
                    <!-- Dinâmico -->
                </div>
            </section>

            <!-- ABA: AGENDA DE VISITAS -->
            <section id="tab-agenda" class="tab-content space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-slate-800">Agenda de Visitas</h2>
                </div>

                <!-- Filtro de Mês da Agenda -->
                <div class="bg-white p-4 rounded-xl border border-slate-200 flex flex-col sm:flex-row gap-3 items-stretch sm:items-center justify-between">
                    <label class="text-sm font-semibold text-slate-700 flex items-center gap-2">
                        <i class="fas fa-calendar-alt text-indigo-500"></i> Selecione o Mês das Visitas:
                    </label>
                    <input type="month" id="agenda-month-filter" class="border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50">
                </div>

                <div id="agenda-container" class="space-y-3">
                    <!-- Dinâmico -->
                </div>
            </section>
        </main>

        <!-- NAVEGAÇÃO INFERIOR -->
        <nav class="bg-white border-t border-slate-200 fixed bottom-0 left-0 right-0 z-40 shadow-lg px-6 py-2 flex justify-around max-w-md mx-auto rounded-t-2xl sm:max-w-xl">
            <button class="nav-btn text-indigo-600 flex flex-col items-center gap-1 py-1 px-4" data-target="tab-leads">
                <i class="fas fa-user-friends text-lg"></i>
                <span class="text-xs font-medium">Leads</span>
            </button>
            <button class="nav-btn text-slate-400 hover:text-indigo-600 flex flex-col items-center gap-1 py-1 px-4" data-target="tab-agenda">
                <i class="fas fa-calendar-check text-lg"></i>
                <span class="text-xs font-medium">Agenda</span>
            </button>
        </nav>
    </div>

    <!-- MODAL: DETALHES DO LEAD -->
    <div id="lead-details-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-xs">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden border border-slate-100 flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i class="fas fa-id-card text-indigo-500"></i> Ficha Completa do Lead
                </h3>
                <button type="button" class="close-modal-btn text-slate-400 hover:text-slate-600 p-1 rounded-lg">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div id="lead-details-content" class="p-6 space-y-6 overflow-y-auto flex-1">
                <!-- Conteúdo Gerado Dinamicamente -->
            </div>
        </div>
    </div>

    <!-- MODAL: REGISTRAR NOVO LEAD -->
    <div id="add-lead-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-xs">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden border border-slate-100 flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i class="fas fa-user-plus text-indigo-500"></i> Cadastrar Novo Lead
                </h3>
                <button type="button" class="close-modal-btn text-slate-400 hover:text-slate-600 p-1 rounded-lg">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="add-lead-form" class="flex-1 overflow-y-auto p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nome da Empresa / Cliente</label>
                    <input type="text" id="lead-name" required class="w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Status do Pipeline</label>
                    <select id="lead-status" required class="w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white">
                        <option value="Lead Frio">Lead Frio</option>
                        <option value="Em Negociação">Em Negociação</option>
                        <option value="Conquista">Conquista</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Telefone de Contato</label>
                    <input type="text" id="lead-phone" placeholder="(00) 00000-0000" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                
                <div class="border-t border-slate-100 pt-3 space-y-3">
                    <span class="block text-xs font-bold text-indigo-600 uppercase tracking-wider">Endereço de Campo</span>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Rua / Logradouro</label>
                            <input type="text" id="lead-street" placeholder="Ex: Av. Central" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Número</label>
                            <input type="text" id="lead-number" placeholder="123" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Bairro</label>
                            <input type="text" id="lead-neighborhood" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Cidade</label>
                            <input type="text" id="lead-city" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-all shadow-md">
                        Salvar Lead
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: AGENDAR NOVA VISITA -->
    <div id="add-visit-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-xs">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border border-slate-100">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i class="fas fa-calendar-plus text-indigo-500"></i> Agendar Visita
                </h3>
                <button type="button" class="close-modal-btn text-slate-400 hover:text-slate-600 p-1 rounded-lg">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="add-visit-form" class="p-6 space-y-4">
                <input type="hidden" id="visit-lead-id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Cliente / Destino</label>
                    <input type="text" id="visit-lead-name" readonly class="w-full px-3 py-2.5 rounded-xl border border-slate-100 bg-slate-100 text-slate-600 text-sm font-medium focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data e Hora da Visita</label>
                    <input type="datetime-local" id="visit-date" required class="w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-all shadow-md pt-2">
                    Confirmar Agendamento
                </button>
            </form>
        </div>
    </div>

    <!-- FIREBASE SERVICES VIA CDN MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, query, where, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config de Produção Fixada
        const firebaseConfig = {
            apiKey: "AIzaSyAQ2YjCv6HLZVJXisieJGbEwkAjCMj1GVE", 
            authDomain: "controladovendas.firebaseapp.com",
            projectId: "controle-de-vendas-7b024",
            storageBucket: "controladovendas.appspot.com",
            messagingSenderId: "532296497230",
            appId: "1:532296497230:web:d27ffc6ec43892809f6e62"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // VARIÁVEIS DE ESTADO DO SISTEMA
        let currentUserId = null;
        let activeFilter = 'todos';
        let unsubscribeLeads = null;
        let unsubscribeVisits = null;
        let inactivityTimeout = null;

        // SISTEMA DE SEGURANÇA: LOGOUT POR INATIVIDADE (10 MINUTOS)
        function startInactivityTimer() {
            resetInactivityTimer();
            const events = ['mousemove', 'keypress', 'touchstart', 'click', 'scroll'];
            events.forEach(event => document.addEventListener(event, resetInactivityTimer));
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            if (currentUserId) {
                inactivityTimeout = setTimeout(executeAutoLogout, 10 * 60 * 1000); // 10 Minutos exatos
            }
        }

        function stopInactivityTimer() {
            clearTimeout(inactivityTimeout);
            const events = ['mousemove', 'keypress', 'touchstart', 'click', 'scroll'];
            events.forEach(event => document.removeEventListener(event, resetInactivityTimer));
        }

        function executeAutoLogout() {
            signOut(auth).then(() => {
                alert("Sua sessão expirou por inatividade (10 minutos). Faça login novamente.");
            }).catch(err => console.error("Erro no auto-logout: ", err));
        }

        // CONTROLADOR DE FLUXO DE TELAS E AUTENTICAÇÃO
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('user-display-email').textContent = user.email;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                // Define mês padrão atual para o input de filtro de visitas (AAAA-MM)
                const now = new Date();
                const currentMonthStr = now.toISOString().substring(0, 7);
                document.getElementById('agenda-month-filter').value = currentMonthStr;

                initRealtimeSync();
                startInactivityTimer();
            } else {
                currentUserId = null;
                stopInactivityTimer();
                if (unsubscribeLeads) unsubscribeLeads();
                if (unsubscribeVisits) unsubscribeVisits();
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        // FORMULÁRIO DE LOGIN DOS VENDEDORES
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => {
                alert("Falha na autenticação: Verifique as credenciais.");
                console.error(err);
            });
        });

        // BOTÃO SAIR MANUAL
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // GERENCIADOR DE SINCRONIZAÇÃO EM TEMPO REAL (FIRESTORE)
        function initRealtimeSync() {
            if (unsubscribeLeads) unsubscribeLeads();
            if (unsubscribeVisits) unsubscribeVisits();

            // Sincronização de Leads
            const qLeads = query(collection(db, "users", currentUserId, "leads"));
            unsubscribeLeads = onSnapshot(qLeads, (snapshot) => {
                const leads = [];
                snapshot.forEach(doc => leads.push({ id: doc.id, ...doc.data() }));
                renderLeadsList(leads);
            }, err => console.error("Erro sincronizando leads: ", err));

            // Sincronização de Visitas baseada no Filtro Mensal
            setupVisitsListener();
        }

        function setupVisitsListener() {
            if (unsubscribeVisits) unsubscribeVisits();

            const selectedMonth = document.getElementById('agenda-month-filter').value; // Formato: "AAAA-MM"
            if (!selectedMonth) return;

            // Define o intervalo inicial e final do mês escolhido para o filtro estruturado
            const startOfMonth = `${selectedMonth}-01T00:00:00`;
            const endOfMonth = `${selectedMonth}-31T23:59:59`;

            const qVisits = query(
                collection(db, "users", currentUserId, "visits"),
                where("date", ">=", startOfMonth),
                where("date", "<=", endOfMonth)
            );

            unsubscribeVisits = onSnapshot(qVisits, (snapshot) => {
                const visits = [];
                snapshot.forEach(doc => visits.push({ id: doc.id, ...doc.data() }));
                // Ordenar por data cronológica crescente
                visits.sort((a, b) => new Date(a.date) - new Date(b.date));
                renderAgendaList(visits);
            }, err => console.error("Erro sincronizando visitas: ", err));
        }

        // Ouvinte de mudança no filtro do mês das visitas
        document.getElementById('agenda-month-filter').addEventListener('change', setupVisitsListener);

        // PROCESSAMENTO DE LEADS NA INTERFACE
        function renderLeadsList(leads) {
            const container = document.getElementById('leads-container');
            container.innerHTML = '';

            const filtered = leads.filter(l => activeFilter === 'todos' || l.status === activeFilter);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full bg-white border border-dashed border-slate-200 rounded-xl p-8 text-center text-slate-400 text-sm">
                        Nenhum lead encontrado neste status.
                    </div>`;
                return;
            }

            filtered.forEach(lead => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-xs hover:shadow-md transition-all flex flex-col justify-between gap-3";
                
                // Determinação da classe CSS dinâmica baseada no pipeline unificado
                let statusClass = "bg-slate-100 text-slate-700";
                if (lead.status === "Lead Frio") statusClass = "status-badge-lead-frio";
                if (lead.status === "Em Negociação") statusClass = "status-badge-em-negociacao";
                if (lead.status === "Conquista") statusClass = "status-badge-conquista";

                const logradouro = lead.street ? `${lead.street}, ${lead.number || 'S/N'}` : 'Endereço não cadastrado';

                card.innerHTML = `
                    <div class="cursor-pointer space-y-1.5 flex-1 open-details-click">
                        <div class="flex items-start justify-between gap-2">
                            <h4 class="font-bold text-slate-800 text-base leading-tight break-words">${lead.name}</h4>
                            <span class="text-[11px] font-bold px-2.5 py-0.5 rounded-full whitespace-nowrap ${statusClass}">${lead.status}</span>
                        </div>
                        <p class="text-xs text-slate-500 flex items-center gap-1.5">
                            <i class="fas fa-map-marker-alt text-slate-400 w-3.5"></i>
                            <span class="truncate">${logradouro}</span>
                        </p>
                        ${lead.phone ? `
                        <p class="text-xs text-slate-500 flex items-center gap-1.5">
                            <i class="fas fa-phone-alt text-slate-400 w-3.5"></i>
                            <span>${lead.phone}</span>
                        </p>` : ''}
                    </div>
                    <div class="border-t border-slate-100 pt-2.5 flex items-center justify-end gap-2">
                        <button class="agendar-visita-btn text-xs font-semibold text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-all" data-id="${lead.id}" data-name="${lead.name}">
                            <i class="fas fa-calendar-plus mr-1"></i> Agendar
                        </button>
                        <button class="excluir-lead-btn text-xs font-semibold text-slate-400 hover:text-rose-600 hover:bg-rose-50 p-1.5 rounded-lg transition-all" data-id="${lead.id}">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;

                // Clique para abrir modal de detalhes individuais
                card.querySelector('.open-details-click').addEventListener('click', () => openLeadDetailsModal(lead));
                
                // Botão de agendamento rápido de visita
                card.querySelector('.agendar-visita-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openAddVisitModal(lead.id, lead.name);
                });

                // Exclusão de Lead
                card.querySelector('.excluir-lead-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`Tem certeza de que deseja deletar permanentemente o lead "${lead.name}"?`)) {
                        deleteDoc(doc(db, "users", currentUserId, "leads", lead.id));
                    }
                });

                container.appendChild(card);
            });
        }

        // CADASTRO DE NOVO LEAD (FORMULÁRIO)
        document.getElementById('add-lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('lead-name').value.trim();
            const status = document.getElementById('lead-status').value; // Retorna "Conquista", "Lead Frio" ou "Em Negociação"
            const phone = document.getElementById('lead-phone').value.trim();
            
            // Novos campos de endereço de campo estruturados
            const street = document.getElementById('lead-street').value.trim();
            const number = document.getElementById('lead-number').value.trim();
            const neighborhood = document.getElementById('lead-neighborhood').value.trim();
            const city = document.getElementById('lead-city').value.trim();

            try {
                await addDoc(collection(db, "users", currentUserId, "leads"), {
                    name,
                    status, // Protegido estruturalmente como singular "Conquista"
                    phone,
                    street,
                    number,
                    neighborhood,
                    city,
                    createdAt: new Date().toISOString()
                });
                closeAllModals();
                document.getElementById('add-lead-form').reset();
            } catch (err) {
                console.error("Erro ao salvar lead: ", err);
                alert("Erro ao salvar dados.");
            }
        });

        // MODAL DE DETALHES COMPLETOS DO LEAD
        function openLeadDetailsModal(lead) {
            const content = document.getElementById('lead-details-content');
            
            let statusClass = "bg-slate-100 text-slate-700";
            if (lead.status === "Lead Frio") statusClass = "status-badge-lead-frio";
            if (lead.status === "Em Negociação") statusClass = "status-badge-em-negociacao";
            if (lead.status === "Conquista") statusClass = "status-badge-conquista";

            content.innerHTML = `
                <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                    <div>
                        <h4 class="text-xl font-bold text-slate-800">${lead.name}</h4>
                        <span class="text-xs text-slate-400 block mt-0.5">ID: ${lead.id}</span>
                    </div>
                    <span class="text-xs font-bold px-3 py-1 rounded-full ${statusClass}">${lead.status}</span>
                </div>
                
                <div class="space-y-4">
                    <h5 class="text-xs font-bold text-indigo-600 uppercase tracking-wider">Dados de Contato</h5>
                    <div class="grid grid-cols-1 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-sm text-slate-700"><span class="font-semibold text-slate-500">Telefone:</span> ${lead.phone || 'Não informado'}</p>
                    </div>
                    
                    <h5 class="text-xs font-bold text-indigo-600 uppercase tracking-wider">Localização do Cliente</h5>
                    <div class="grid grid-cols-1 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100 text-sm text-slate-700">
                        <p><span class="font-semibold text-slate-500">Logradouro:</span> ${lead.street || 'Não informado'}</p>
                        <p><span class="font-semibold text-slate-500">Número:</span> ${lead.number || 'S/N'}</p>
                        <p><span class="font-semibold text-slate-500">Bairro:</span> ${lead.neighborhood || 'Não informado'}</p>
                        <p><span class="font-semibold text-slate-500">Cidade:</span> ${lead.city || 'Não informado'}</p>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100 flex gap-2">
                    <button id="modal-edit-status-btn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 rounded-xl text-xs transition-all flex items-center justify-center gap-1">
                        <i class="fas fa-edit"></i> Alterar Status
                    </button>
                </div>
            `;

            // Ação interna de troca rápida de status dentro da Ficha detalhada
            document.getElementById('modal-edit-status-btn').addEventListener('click', async () => {
                const novoStatus = prompt("Digite o novo status exato (Lead Frio, Em Negociação, Conquista):", lead.status);
                if (novoStatus && ["Lead Frio", "Em Negociação", "Conquista"].includes(novoStatus)) {
                    await updateDoc(doc(db, "users", currentUserId, "leads", lead.id), { status: novoStatus });
                    closeAllModals();
                } else if (novoStatus) {
                    alert("Status Inválido! Use apenas: 'Lead Frio', 'Em Negociação' ou 'Conquista'.");
                }
            });

            document.getElementById('lead-details-modal').classList.remove('hidden');
        }

        // AGENDAMENTO DE VISITAS DE CAMPO
        function openAddVisitModal(leadId, leadName) {
            document.getElementById('visit-lead-id').value = leadId;
            document.getElementById('visit-lead-name').value = leadName;
            document.getElementById('add-visit-modal').classList.remove('hidden');
        }

        document.getElementById('add-visit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const leadId = document.getElementById('visit-lead-id').value;
            const leadName = document.getElementById('visit-lead-name').value;
            const date = document.getElementById('visit-date').value; // Formato retornado: "YYYY-MM-DDTHH:MM"

            try {
                await addDoc(collection(db, "users", currentUserId, "visits"), {
                    leadId,
                    leadName,
                    date,
                    done: false,
                    createdAt: new Date().toISOString()
                });
                closeAllModals();
                document.getElementById('add-visit-form').reset();
            } catch (err) {
                console.error("Erro agendando visita: ", err);
            }
        });

        // PROCESSAMENTO DA AGENDA DE VISITAS NA INTERFACE
        function renderAgendaList(visits) {
            const container = document.getElementById('agenda-container');
            container.innerHTML = '';

            if (visits.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border border-dashed border-slate-200 rounded-xl p-8 text-center text-slate-400 text-sm">
                        Nenhuma visita de campo agendada para o mês selecionado.
                    </div>`;
                return;
            }

            visits.forEach(visit => {
                const item = document.createElement('div');
                // Altera a opacidade visual do card de visita caso já esteja concluída
                item.className = `bg-white p-4 rounded-xl border ${visit.done ? 'border-slate-100 opacity-65 bg-slate-50/50' : 'border-slate-200'} shadow-xs flex items-center justify-between gap-3 transition-all`;

                const dataFormatada = new Date(visit.date).toLocaleString('pt-BR', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                item.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <button class="toggle-visit-done-btn text-xl ${visit.done ? 'text-green-500' : 'text-slate-300 hover:text-indigo-500'} transition-all flex-shrink-0" data-id="${visit.id}" data-done="${visit.done}">
                            <i class="${visit.done ? 'fas fa-check-circle' : 'far fa-circle'}"></i>
                        </button>
                        <div class="min-w-0">
                            <h4 class="font-bold text-slate-800 text-sm truncate ${visit.done ? 'line-through text-slate-400' : ''}">${visit.leadName}</h4>
                            <p class="text-xs text-indigo-600 font-medium mt-0.5"><i class="far fa-clock mr-1"></i>${dataFormatada}</p>
                        </div>
                    </div>
                    <button class="deletar-visita-btn text-slate-300 hover:text-rose-600 p-2 rounded-lg transition-all" data-id="${visit.id}">
                        <i class="fas fa-calendar-times"></i>
                    </button>
                `;

                // Alternador de Status Concluído/Aberto da visita
                item.querySelector('.toggle-visit-done-btn').addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    const currentDone = e.currentTarget.getAttribute('data-done') === 'true';
                    updateDoc(doc(db, "users", currentUserId, "visits", id), { done: !currentDone });
                });

                // Cancelamento/Exclusão do compromisso da Agenda
                item.querySelector('.deletar-visita-btn').addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    if (confirm("Remover esta visita agendada permanentemente?")) {
                        deleteDoc(doc(db, "users", currentUserId, "visits", id));
                    }
                });

                container.appendChild(item);
            });
        }

        // CONTROLADORES INTERNOS DA INTERFACE DO CLIENTE (DOM)
        
        // Gerenciamento de Cliques na Barra de Abas Inferior (Tabs)
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const target = e.currentTarget.getAttribute('data-target');
                
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(nb => {
                    nb.classList.remove('text-indigo-600');
                    nb.classList.add('text-slate-400');
                });

                document.getElementById(target).classList.add('active');
                e.currentTarget.classList.remove('text-slate-400');
                e.currentTarget.classList.add('text-indigo-600');
            });
        });

        // Gerenciamento dos Botões de Filtro de Leads (Muda o Estado Ativo e Sincroniza)
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(fb => fb.classList.remove('active', 'bg-slate-100', 'text-slate-700'));
                e.currentTarget.classList.add('active', 'bg-slate-100', 'text-slate-700');
                activeFilter = e.currentTarget.getAttribute('data-status');
                
                // Força recarregamento local via re-escuta do snapshot armazenado
                initRealtimeSync();
            });
        });

        // Eventos de Abertura e Fechamento de Modais Gerais
        document.getElementById('open-add-lead-modal').addEventListener('click', () => {
            document.getElementById('add-lead-modal').classList.remove('hidden');
        });

        document.querySelectorAll('.close-modal-btn').forEach(btn => {
            btn.addEventListener('click', closeAllModals);
        });

        function closeAllModals() {
            document.getElementById('add-lead-modal').classList.add('hidden');
            document.getElementById('add-visit-modal').classList.add('hidden');
            document.getElementById('lead-details-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
