<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Vendas e Visitas</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
            --danger: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Telas */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }

        /* Cards e Formas */
        .card {
            background: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        h2 {
            margin-bottom: 20px;
            color: var(--text);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        button.btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            margin-top: 10px;
        }
        button.btn-secondary:hover {
            background-color: #eff6ff;
        }

        /* Header do App */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .btn-logout {
            background-color: var(--danger);
            width: auto;
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        .btn-logout:hover {
            background-color: #b91c1c;
        }

        /* Lista de Registros */
        .list-item {
            background: var(--surface);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-info p {
            margin-bottom: 4px;
        }
        .item-type {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .type-venda { background: #dcfce7; color: var(--success); }
        .type-visita { background: #fee2e2; color: var(--danger); }

        .empty-state {
            text-align: center;
            color: var(--text-light);
            padding: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- SCREEN 1: AUTENTICAÇÃO -->
        <div id="auth-screen" class="screen active">
            <div class="card" style="max-width: 400px; margin: 60px auto 0 auto;">
                <h2 id="auth-title">Acessar Sistema</h2>
                <form id="auth-form">
                    <div class="form-group">
                        <label for="auth-email">E-mail</label>
                        <input type="email" id="auth-email" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="auth-password">Senha</label>
                        <input type="password" id="auth-password" required placeholder="Sua senha">
                    </div>
                    <button type="submit" id="btn-auth-submit">Entrar</button>
                    <button type="button" id="btn-toggle-auth" class="btn-secondary">Criar uma conta</button>
                </form>
            </div>
        </div>

        <!-- SCREEN 2: APLICATIVO PRINCIPAL -->
        <div id="app-screen" class="screen">
            <header class="app-header">
                <div>
                    <h1>Controle de Vendas</h1>
                    <span id="user-display" style="font-size: 0.85rem; color: var(--text-light);"></span>
                </div>
                <button id="btn-logout" class="btn-logout">Sair</button>
            </header>

            <!-- Formulário de Lançamento -->
            <div class="card">
                <h2>Novo Registro</h2>
                <form id="registro-form">
                    <div class="form-group">
                        <label for="tipo">Tipo de Registro</label>
                        <select id="tipo" required>
                            <option value="venda">Venda Concluída</option>
                            <option value="visita">Visita Comercial</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cliente">Nome do Cliente / Empresa</label>
                        <input type="text" id="cliente" required placeholder="Ex: João Silva ou Empresa X">
                    </div>
                    <div class="form-group" id="group-valor">
                        <label for="valor">Valor da Venda (R$)</label>
                        <input type="number" id="valor" step="0.01" min="0" placeholder="0,00">
                    </div>
                    <div class="form-group">
                        <label for="observacao">Observações / Detalhes</label>
                        <input type="text" id="observacao" placeholder="Ex: Deixou proposta, retorno dia 10">
                    </div>
                    <button type="submit">Salvar na Nuvem</button>
                </form>
            </div>

            <!-- Histórico -->
            <div class="card">
                <h2>Histórico de Atividades</h2>
                <div id="lista-registros">
                    <!-- Registros reais do Firestore entrarão aqui dinamicamente -->
                    <p class="empty-state">Carregando dados sincronizados...</p>
                </div>
            </div>
        </div>

    </div>

    <!-- INTEGRACAO COM O FIREBASE (SDK v10+) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Suas credenciais fornecidas pelo console do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAQ2YjCv6HLZVJXisieJGbEwkAjCMj1GVE",
            authDomain: "controle-de-vendas-7b024.firebaseapp.com",
            projectId: "controle-de-vendas-7b024",
            storageBucket: "controle-de-vendas-7b024.firebasestorage.app",
            messagingSenderId: "639512528905",
            appId: "1:639512528905:web:530e5755abd1cebba050d8"
        };

        // Inicializando os Serviços do Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado e Elementos de Interface
        let isLoginMode = true;
        let unsubscribeTimeline = null; // Armazena o ouvinte em tempo real do banco

        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const btnAuthSubmit = document.getElementById('btn-auth-submit');
        const btnToggleAuth = document.getElementById('btn-toggle-auth');
        const userDisplay = document.getElementById('user-display');
        const btnLogout = document.getElementById('btn-logout');
        const registroForm = document.getElementById('registro-form');
        const tipoSelect = document.getElementById('tipo');
        const groupValor = document.getElementById('group-valor');
        const listaRegistros = document.getElementById('lista-registros');

        // Alternar Visibilidade do campo Valor conforme o tipo escolhido
        tipoSelect.addEventListener('change', () => {
            if (tipoSelect.value === 'visita') {
                groupValor.style.display = 'none';
                document.getElementById('valor').removeAttribute('required');
            } else {
                groupValor.style.display = 'block';
            }
        });

        // Alternar entre Login e Cadastro
        btnToggleAuth.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.innerText = "Acessar Sistema";
                btnAuthSubmit.innerText = "Entrar";
                btnToggleAuth.innerText = "Criar uma conta";
            } else {
                authTitle.innerText = "Criar Nova Conta";
                btnAuthSubmit.innerText = "Cadastrar";
                btnToggleAuth.innerText = "Já tenho uma conta";
            }
        });

        // Gerenciamento de Formulário de Autenticação (Login / Cadastro)
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Conta criada com sucesso!");
                }
                authForm.reset();
            } catch (error) {
                console.error(error);
                alert("Erro na autenticação: " + error.message);
            }
        });

        // Botão Sair
        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        // Monitoramento de Estado do Usuário (Sessão Ativa ou Não)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuário conectado
                authScreen.classList.remove('active');
                appScreen.classList.add('active');
                userDisplay.innerText = `Conectado como: ${user.email}`;
                
                // Inicia a escuta em tempo real dos dados desse usuário específico
                configurarSincronizacaoDados(user.uid);
            } else {
                // Usuário desconectado
                appScreen.classList.remove('active');
                authScreen.classList.add('active');
                userDisplay.innerText = "";
                
                // Cancela o ouvinte do banco para evitar vazamento de memória
                if (unsubscribeTimeline) {
                    unsubscribeTimeline();
                    unsubscribeTimeline = null;
                }
            }
        });

        // Envio de novo registro para o Firestore
        registroForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentUser = auth.currentUser;
            if (!currentUser) return;

            const tipo = document.getElementById('tipo').value;
            const cliente = document.getElementById('cliente').value;
            const valor = tipo === 'venda' ? parseFloat(document.getElementById('valor').value) || 0 : 0;
            const observacao = document.getElementById('observacao').value;

            try {
                // Salvando no Firestore vinculando o registro ao UID do usuário logado
                await addDoc(collection(db, "atividades"), {
                    userId: currentUser.uid,
                    tipo: tipo,
                    cliente: cliente,
                    valor: valor,
                    observacao: observacao,
                    dataCriacao: new Date().toISOString()
                });

                registroForm.reset();
                if(tipoSelect.value === 'visita') groupValor.style.display = 'none'; // mantem consistencia visual
                alert("Salvo com sucesso na nuvem!");
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Erro ao salvar na nuvem: " + error.message);
            }
        });

        // Função que lê e atualiza a interface em tempo real
        function configurarSincronizacaoDados(userId) {
            // Filtra os dados: traz apenas os documentos pertencentes ao usuário logado
            const q = query(
                collection(db, "atividades"),
                where("userId", "==", userId),
                orderBy("dataCriacao", "desc")
            );

            // O onSnapshot garante que qualquer mudança no banco atualize a tela na hora
            unsubscribeTimeline = onSnapshot(q, (querySnapshot) => {
                listaRegistros.innerHTML = "";

                if (querySnapshot.empty) {
                    listaRegistros.innerHTML = '<p class="empty-state">Nenhum registro encontrado. Comece adicionando um acima!</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'list-item';

                    // Formatação de valores monetários se for venda
                    const infoValor = dados.tipo === 'venda' 
                        ? `<strong>Valor:</strong> R$ ${dados.valor.toFixed(2)}<br>` 
                        : '';

                    itemDiv.innerHTML = `
                        <div class="item-info">
                            <p><strong>Cliente:</strong> ${dados.cliente}</p>
                            <p>${infoValor}<strong>Obs:</strong> ${dados.observacao || 'Nenhuma'}</p>
                            <small style="color: var(--text-light);">${new Date(dados.dataCriacao).toLocaleString('pt-BR')}</small>
                        </div>
                        <div>
                            <span class="item-type type-${dados.tipo}">${dados.tipo}</span>
                        </div>
                    `;
                    listaRegistros.appendChild(itemDiv);
                });
            }, (error) => {
                console.error("Erro na sincronização:", error);
                // Tratamento caso falte criar um índice no Firestore (o console avisa e dá o link se necessário)
                listaRegistros.innerHTML = `<p class="empty-state" style="color:var(--danger)">Erro ao carregar dados do servidor.</p>`;
            });
        }
    </script>
</body>
</html>
